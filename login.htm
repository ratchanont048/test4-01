<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>เข้าสู่ระบบ | Patient Triage System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Hero -->
    <div class="login-hero">
      <div class="logo-wrap">
        <!-- Cross / Medical Icon -->
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="17" y="6" width="10" height="32" rx="4" fill="white"/>
          <rect x="6" y="17" width="32" height="10" rx="4" fill="white"/>
        </svg>
      </div>
      <h1>Patient Triage System</h1>
      <p>ระบบคัดกรองผู้ป่วยเบื้องต้น</p>
    </div>

    <!-- Form -->
    <div class="login-form-wrap">

      <div class="alert-banner info" style="margin-bottom:20px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        ทดสอบ: user/pass ใดก็ได้ หรือ admin/admin เพื่อเข้า Dashboard
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้ <span class="required">*</span></label>
          <input
            class="form-control"
            type="text"
            id="username"
            placeholder="กรอกชื่อผู้ใช้"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน <span class="required">*</span></label>
          <div class="input-group">
            <input
              class="form-control"
              type="password"
              id="password"
              placeholder="กรอกรหัสผ่าน"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="แสดงรหัสผ่าน">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <p id="login-error" style="display:none;color:#eb5757;font-size:13px;font-weight:600;margin-bottom:12px;padding:10px 14px;background:#fdeaea;border-radius:8px;"></p>

        <button type="submit" class="btn btn-primary" id="login-btn">
          เข้าสู่ระบบ
        </button>
      </form>

      <p class="text-center text-sm text-muted mt-16">
        ระบบสำหรับบุคลากรทางการแพทย์เท่านั้น
      </p>
    </div>

    <!-- Footer brand -->
    <div style="text-align:center;padding:0 20px 32px;color:#94a3b8;font-size:12px;">
      Patient Triage System v1.0 &mdash; Senior Project 2025
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
