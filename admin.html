<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>แดชบอร์ด | Patient Triage System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-row">
        <div>
          <div class="hospital-name">Admin Dashboard</div>
          <h1>คิวผู้ป่วยทั้งหมด</h1>
          <div class="subtitle" id="clock"></div>
        </div>
        <a href="login.html" class="back-btn" title="ออกจากระบบ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Page Content -->
    <div class="page-content">

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-card blue">
          <div class="stat-num" id="stat-all">0</div>
          <div class="stat-label">ทั้งหมด</div>
        </div>
        <div class="stat-card red">
          <div class="stat-num" id="stat-red">0</div>
          <div class="stat-label">ฉุกเฉิน</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-num" id="stat-yellow">0</div>
          <div class="stat-label">ปานกลาง</div>
        </div>
      </div>

      <div class="stats-row" style="grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
        <div class="stat-card green">
          <div class="stat-num" id="stat-green">0</div>
          <div class="stat-label">ปกติ</div>
        </div>
        <div class="stat-card" style="background:white;">
          <div class="stat-num" style="color:#2f80ed;font-size:18px;margin-top:2px;">
            <span id="current-time">--:--</span>
          </div>
          <div class="stat-label">เวลาปัจจุบัน</div>
        </div>
      </div>

      <!-- Sort Bar -->
      <div class="sort-bar">
        <span class="sort-label">รายการผู้ป่วย</span>
        <select class="sort-select" id="sort-select">
          <option value="priority">เรียงตามความเร่งด่วน</option>
          <option value="time">เรียงตามเวลา</option>
          <option value="name">เรียงตามชื่อ</option>
        </select>
      </div>

      <!-- Patient List -->
      <div id="patient-list"></div>

      <!-- Legend -->
      <div class="card" style="padding:14px 18px;margin-top:8px;">
        <div class="text-sm fw-bold text-muted" style="margin-bottom:10px;">คำอธิบายสัญลักษณ์</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#eb5757;flex-shrink:0;"></span>
            <span class="text-sm">ฉุกเฉิน (Emergency) — รหัส E</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#f2c94c;flex-shrink:0;"></span>
            <span class="text-sm">ปานกลาง (Moderate) — รหัส M</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#27ae60;flex-shrink:0;"></span>
            <span class="text-sm">ปกติ (Normal) — รหัส N</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="user.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>บันทึก</span>
      </a>
      <a href="result.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>ผลคัดกรอง</span>
      </a>
      <a href="admin.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>แดชบอร์ด</span>
      </a>
    </nav>

  </div>

  <script src="script.js"></script>
  <script>
    // Live clock
    function updateClock() {
      const now = new Date();
      const t = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const el = document.getElementById('current-time');
      if (el) el.textContent = t;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
